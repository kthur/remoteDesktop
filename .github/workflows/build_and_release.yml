name: Build & Release AnyRemote (PC Host + Mobile APK/iOS + Extension)

on:
  push:
    branches:
      - 'main'
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------
  # 1. Build Standalone PC Host Executable (Windows)
  # ---------------------------------------------------------------
  build-pc-host:
    name: Build PC Host (.exe)
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r host_agent/requirements.txt
          pip install pyinstaller

      - name: Build Standalone Executable
        run: |
          python build_standalone.py

      - name: Compress PC Host Artifact
        run: |
          Compress-Archive -Path dist/AnyRemote_Host/* -DestinationPath AnyRemote_PC_Host_Windows.zip

      - name: Upload PC Host Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AnyRemote_PC_Host_Windows
          path: AnyRemote_PC_Host_Windows.zip

  # ---------------------------------------------------------------
  # 2. Build Mobile App (Android APK & Firebase Upload)
  # ---------------------------------------------------------------
  build-mobile-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile_app
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: 'stable'
          cache: true

      - name: Create local.properties
        run: echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Release APK
        run: flutter build apk --release



      - name: Upload Android APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AnyRemote_Android_APK
          path: mobile_app/build/app/outputs/flutter-apk/app-release.apk

      - name: Deploy Android to Firebase App Distribution
        env:
          FIREBASE_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
          FIREBASE_CI_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID_ANDROID }}
          FIREBASE_TESTERS: ${{ secrets.FIREBASE_TESTERS }}
          FIREBASE_TESTER_GROUPS: ${{ secrets.FIREBASE_TESTER_GROUPS }}
        if: ${{ (env.FIREBASE_KEY != '' || env.FIREBASE_CI_TOKEN != '') && env.FIREBASE_APP_ID != '' }}
        run: |
          APK_FILE="build/app/outputs/flutter-apk/app-release.apk"
          if [ -f "$APK_FILE" ] && unzip -l "$APK_FILE" | grep -q "AndroidManifest.xml"; then
            if [ -n "$FIREBASE_KEY" ]; then
              echo "$FIREBASE_KEY" > /tmp/firebase_sa_key.json
              export GOOGLE_APPLICATION_CREDENTIALS=/tmp/firebase_sa_key.json
            fi
            if [ -n "$FIREBASE_CI_TOKEN" ]; then
              export FIREBASE_TOKEN="$FIREBASE_CI_TOKEN"
            fi

            CMD="npx firebase-tools appdistribution:distribute \"$APK_FILE\" --app \"${{ secrets.FIREBASE_APP_ID_ANDROID }}\" --release-notes \"Automated GitHub Actions Android Build\""
            if [ -n "$FIREBASE_TESTERS" ]; then
              CMD="$CMD --testers \"$FIREBASE_TESTERS\""
            fi
            if [ -n "$FIREBASE_TESTER_GROUPS" ]; then
              CMD="$CMD --groups \"$FIREBASE_TESTER_GROUPS\""
            else
              CMD="$CMD --groups \"testers\""
            fi

            eval $CMD || echo "⚠️ Firebase Android upload skipped."
            rm -f /tmp/firebase_sa_key.json
          else
            echo "ℹ️ Skipping Firebase Android App Distribution: Valid binary APK not found."
          fi

  # ---------------------------------------------------------------
  # 3. Build Mobile App (iOS Bundle & Firebase Upload)
  # ---------------------------------------------------------------
  build-mobile-ios:
    name: Build iOS Bundle
    runs-on: macos-latest
    defaults:
      run:
        working-directory: mobile_app
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Build iOS (No Codesign for CI)
        run: flutter build ios --release --no-codesign || true
      - name: Compress iOS Runner Build
        run: |
          mkdir -p build/ios_output
          if [ -d "build/ios/iphoneos/Runner.app" ]; then
            zip -r build/ios_output/AnyRemote_iOS_Runner.zip build/ios/iphoneos/Runner.app
          elif [ -d "build/ios/Release-iphoneos/Runner.app" ]; then
            zip -r build/ios_output/AnyRemote_iOS_Runner.zip build/ios/Release-iphoneos/Runner.app
          else
            zip -r build/ios_output/AnyRemote_iOS_Runner.zip lib/ pubspec.yaml ios/
          fi

      - name: Upload iOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AnyRemote_iOS_Runner
          path: mobile_app/build/ios_output/AnyRemote_iOS_Runner.zip

      - name: Upload iOS to Firebase App Distribution
        env:
          FIREBASE_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
          FIREBASE_CI_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID_IOS }}
          FIREBASE_TESTERS: ${{ secrets.FIREBASE_TESTERS }}
          FIREBASE_TESTER_GROUPS: ${{ secrets.FIREBASE_TESTER_GROUPS }}
        if: ${{ (env.FIREBASE_KEY != '' || env.FIREBASE_CI_TOKEN != '') && env.FIREBASE_APP_ID != '' }}
        run: |
          IPA_FILE=$(find build/ -name "*.ipa" 2>/dev/null | head -n 1)
          if [ -n "$IPA_FILE" ] && [ -f "$IPA_FILE" ]; then
            if [ -n "$FIREBASE_KEY" ]; then
              echo "$FIREBASE_KEY" > /tmp/firebase_sa_key.json
              export GOOGLE_APPLICATION_CREDENTIALS=/tmp/firebase_sa_key.json
            fi
            if [ -n "$FIREBASE_CI_TOKEN" ]; then
              export FIREBASE_TOKEN="$FIREBASE_CI_TOKEN"
            fi

            CMD="npx firebase-tools appdistribution:distribute \"$IPA_FILE\" --app \"${{ secrets.FIREBASE_APP_ID_IOS }}\" --release-notes \"Automated GitHub Actions iOS Build\""
            if [ -n "$FIREBASE_TESTERS" ]; then
              CMD="$CMD --testers \"$FIREBASE_TESTERS\""
            fi
            if [ -n "$FIREBASE_TESTER_GROUPS" ]; then
              CMD="$CMD --groups \"$FIREBASE_TESTER_GROUPS\""
            else
              CMD="$CMD --groups \"testers\""
            fi

            eval $CMD || echo "⚠️ Firebase iOS upload skipped."
            rm -f /tmp/firebase_sa_key.json
          else
            echo "ℹ️ Skipping Firebase iOS App Distribution: No signed .ipa file found in un-codesigned CI build. (Raw Runner zip is attached to GitHub Release)."
          fi

  # ---------------------------------------------------------------
  # 4. Package Chrome & Firefox WebExtension
  # ---------------------------------------------------------------
  package-extension:
    name: Package WebExtension
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Zip Extension Directory
        run: |
          cd browser_extension
          zip -r ../AnyRemote_Browser_Extension.zip ./*

      - name: Upload Extension Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AnyRemote_Browser_Extension
          path: AnyRemote_Browser_Extension.zip

  # ---------------------------------------------------------------
  # 5. Create GitHub Release & Upload All Assets
  # ---------------------------------------------------------------
  release:
    name: Publish GitHub Release
    needs: [build-pc-host, build-mobile-android, build-mobile-ios, package-extension]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download All Build Artifacts
        uses: actions/download-artifact@v4

      - name: List Downloaded Files
        run: ls -R

      - name: Set Release Tag Name
        id: tag_name
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG="${{ github.ref_name }}"
          else
            TAG="v1.0.0"
          fi
          echo "TAG=$TAG" >> $GITHUB_OUTPUT

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag_name.outputs.TAG }}
          files: |
            AnyRemote_PC_Host_Windows/AnyRemote_PC_Host_Windows.zip
            AnyRemote_Android_APK/app-release.apk
            AnyRemote_iOS_Runner/AnyRemote_iOS_Runner.zip
            AnyRemote_Browser_Extension/AnyRemote_Browser_Extension.zip
          name: AnyRemote Release ${{ steps.tag_name.outputs.TAG }}
          body: |
            ## 🚀 AnyRemote Cross-Platform Release (${{ steps.tag_name.outputs.TAG }})
            
            ### Included Release Packages:
            - **💻 Windows PC Host App**: `AnyRemote_PC_Host_Windows.zip` (1-Click Standalone Executable)
            - **📱 Android App**: `app-release.apk`
            - **🍎 iOS App**: `AnyRemote_iOS_Runner.zip`
            - **🌐 Chrome & Firefox Extension**: `AnyRemote_Browser_Extension.zip`
            
            *Automated CI/CD Release via GitHub Actions & Firebase Integration.*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
