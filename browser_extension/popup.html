<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AnyRemote Host Extension</title>
  <style>
    body {
      width: 320px;
      margin: 0;
      padding: 16px;
      font-family: 'Segoe UI', Roboto, sans-serif;
      background-color: #0F172A;
      color: #F8FAFC;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .header h2 {
      margin: 0;
      font-size: 16px;
      color: #38BDF8;
    }
    .card {
      background-color: #1E293B;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
      margin-bottom: 14px;
    }
    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      font-size: 14px;
      cursor: pointer;
      background-color: #0284C7;
      color: white;
    }
    .btn-stop {
      background-color: #DC2626;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      margin-bottom: 12px;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background-color: #94A3B8;
    }
    .dot.online {
      background-color: #4ADE80;
    }
  </style>
</head>
<body>
  <div class="header">
    <h2>🖥️ AnyRemote Extension Host</h2>
  </div>

  <div class="card">
    <div style="font-size:12px; color:#94A3B8;">Synced Account</div>
    <div id="txtAccount" style="font-weight:bold; margin-top:4px;">Not Logged In</div>
  </div>

  <div class="card">
    <div class="status">
      <div id="statusDot" class="dot"></div>
      <span id="txtStatus">Host Agent Stopped</span>
    </div>
    <button id="btnToggle" class="btn">🚀 Start Browser Host</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
